<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Intelligent Ensemble</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Special+Gothic+Condensed+One&family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="unlockOverlay" class="unlock-overlay">
      <div class="unlock-card" role="dialog" aria-modal="true" aria-label="Unlock Dashboard">
        <div id="unlockDigits" class="unlock-digits">
          <input class="unlock-digit" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" />
          <input class="unlock-digit" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" />
          <input class="unlock-digit" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" />
          <input class="unlock-digit" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" />
          <input class="unlock-digit" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" />
          <input class="unlock-digit" type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="off" />
        </div>
        <div id="unlockError" class="unlock-error" aria-live="polite"></div>
      </div>
    </div>

    <div id="appShell" class="app-shell locked">
      <header class="topbar">
        <div class="brand">
          <div class="brand-main">
            <span>Intelligent Ensemble</span>
            <small>by zjz</small>
          </div>
        </div>

        <div class="top-actions">
          <button id="notionBtn" class="nav-btn" type="button">Notion</button>
          <button id="githubBtn" class="nav-btn" type="button">GitHub</button>
          <button id="zjzBtn" class="nav-btn" type="button">zjz.world</button>
        </div>
      </header>

      <main class="workspace">
        <section class="left-grid">
          <section class="panel token-panel">
            <div class="panel-head compact">
              <h2 id="tokenTitle"></h2>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th id="thModel"></th>
                    <th id="thTokenDaily"></th>
                    <th id="thTokenTotal"></th>
                  </tr>
                </thead>
                <tbody id="tokenTable"></tbody>
              </table>
            </div>
          </section>

          <section class="panel agent-panel">
            <div class="panel-head compact">
              <h2 id="agentTitle"></h2>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th id="thAgentName"></th>
                    <th id="thAgentCharacter"></th>
                    <th id="thAgentModel"></th>
                    <th id="thAgentStatus"></th>
                  </tr>
                </thead>
                <tbody id="agentTable"></tbody>
              </table>
            </div>
          </section>

          <section class="panel chatbox-panel">
            <div class="panel-head">
              <h2 id="chatboxTitle"></h2>
              <span id="chatAgentBadge" class="chat-agent-badge"></span>
            </div>
            <div class="chatbox-shell">
              <div class="chat-main-column">
                <div id="chatboxMessages" class="chatbox-messages"></div>

                <div class="chatbox-composer">
                  <textarea id="chatboxInput"></textarea>
                  <button id="sendChatBtn" class="send-btn" type="button">↑</button>
                </div>
              </div>
            </div>
            <div id="chatboxStatus" class="status-text"></div>
          </section>

          <section class="panel memory-panel">
            <div class="panel-head compact">
              <h2 id="memoryTitle"></h2>
            </div>
            <div id="memoryTierRows" class="memory-rows"></div>
            <div id="memoryVectorInfo" class="panel-note"></div>
          </section>

          <section class="panel hooks-panel">
            <div class="panel-head compact">
              <h2 id="hooksTitle"></h2>
            </div>
            <div id="hooksList" class="side-list"></div>
          </section>

          <section class="panel skills-panel">
            <div class="panel-head compact">
              <h2 id="skillsTitle"></h2>
            </div>
            <div id="skillsList" class="side-list"></div>
          </section>

          <section class="panel rules-panel">
            <div class="panel-head compact">
              <h2 id="rulesTitle"></h2>
            </div>
            <div id="rulesList" class="side-list"></div>
          </section>

          <section class="panel task-panel">
            <div class="panel-head compact">
              <h2 id="taskTitle"></h2>
            </div>
            <div class="table-scroll compact-table">
              <table>
                <thead>
                  <tr>
                    <th id="thTaskContent"></th>
                    <th id="thTaskCadence"></th>
                  </tr>
                </thead>
                <tbody id="taskTable"></tbody>
              </table>
            </div>
          </section>

          <section class="panel project-panel">
            <div class="panel-head compact">
              <h2 id="projectTitle"></h2>
            </div>
            <div id="projectList" class="project-list"></div>
          </section>

          <section class="panel workplace-panel">
            <div class="panel-head compact">
              <h2 id="workplaceTitle"></h2>
            </div>
            <div id="workplaceFeed" class="workplace-feed"></div>
          </section>

          <section class="panel mcp-panel">
            <div class="panel-head compact">
              <h2 id="mcpTitle"></h2>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th id="thMcpApp"></th>
                    <th id="thMcpAgent"></th>
                    <th id="thMcpMethod"></th>
                  </tr>
                </thead>
                <tbody id="mcpTable"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>

      <span id="updatedAt" class="hidden">-</span>
      <span id="errorCode" class="floating-error">-</span>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
